<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Usuario</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container page-container-medium">
      <div class="page-header">
        <div class="brand">
          <img src="assets/logo-sag.jpg" alt="Logo SAG" class="brand-logo" />
          <h1 class="brand-title">Panel Usuario</h1>
        </div>
      </div>

      <div class="card">
        <p>Bienvenido, <strong id="userName"></strong> (user)</p>
        <button id="logoutBtn" type="button">Cerrar sesión</button>
      </div>

      <div class="card">
        <h2>Documentos</h2>
        <div class="filters">
          <input type="text" id="filterName" placeholder="Buscar por nombre" />
          <input
            type="text"
            id="filterVoucher"
            placeholder="Número de comprobante"
          />
          <select id="filterStatus">
            <option value="">Todos los estados</option>
            <option value="available">Disponible</option>
            <option value="updated">Actualizado</option>
            <option value="missing">No encontrado</option>
            <option value="pending">Pendiente</option>
            <option value="error">Error</option>
          </select>
          <button id="searchBtn" type="button">Buscar</button>
        </div>
        <p id="documentsHint" class="documents-hint">
          Los documentos aparecerán cuando pulses "Buscar".
        </p>
        <div id="documentsList"></div>
      </div>
    </div>

    <script src="/app-config.js"></script>
    <script src="document-ui.js"></script>
    <script src="document-dialogs.js"></script>
    <script src="notifications.js"></script>
    <script>
      const API_BASE = window.APP_CONFIG?.BASE_URL || window.location.origin;
      const USER_DOCUMENT_ACTIONS = [
        { key: "detail", label: "Ver detalle" },
        { key: "open", label: "Abrir" },
        { key: "history", label: "Ver historial" },
      ];

      let userPageInitialized = false;

      window.addEventListener("DOMContentLoaded", setup);

      async function setup() {
        if (userPageInitialized) {
          return;
        }

        userPageInitialized = true;

        document.getElementById("logoutBtn").addEventListener("click", logout);
        document
          .getElementById("searchBtn")
          .addEventListener("click", handleDocumentSearch);

        window.documentUi.bindDelegatedClicks("documentsList", handleDocumentAction);
        clearDocumentsList();
        await loadUser();
      }

      async function logout() {
        await fetch(`${API_BASE}/api/auth/logout`, {
          method: "POST",
          credentials: "include",
        });
        window.location.href = "index.html";
      }

      async function loadUser() {
        try {
          const response = await fetch(`${API_BASE}/api/protected/me`, {
            credentials: "include",
          });

          if (response.status !== 200) {
            window.location.href = "index.html";
            return;
          }

          const body = await response.json();
          if (body.user?.role !== "user") {
            window.location.href = "admin.html";
            return;
          }

          document.getElementById("userName").textContent =
            body.user?.name || "Usuario";
        } catch (error) {
          console.error("Error auth/user:", error);
          window.location.href = "index.html";
        }
      }

      function setUserActionMessage(message, type = "info", options = {}) {
        if (!message) {
          return;
        }

        const defaults =
          type === "error"
            ? { duration: 7000, closable: true }
            : { duration: 4000, closable: true };

        window.appNotifier?.show(message, {
          type,
          ...defaults,
          ...options,
        });
      }

      async function handleDocumentSearch() {
        await searchDocuments();
      }

      async function searchDocuments() {
        const query = window.documentUi.buildDocumentQuery({
          name: document.getElementById("filterName").value,
          voucher: document.getElementById("filterVoucher").value,
          status: document.getElementById("filterStatus").value,
        });

        const url = query
          ? `${API_BASE}/api/documents?${query}`
          : `${API_BASE}/api/documents`;
        const response = await fetch(url, { credentials: "include" });
        const documents = await response.json().catch(() => []);

        renderDocuments(Array.isArray(documents) ? documents : []);
      }

      function clearDocumentsList() {
        window.documentUi.clearDocumentsList({
          list: "documentsList",
          hint: "documentsHint",
          initialMessage: 'Los documentos aparecerán cuando pulses "Buscar".',
        });
      }

      function renderDocuments(documents) {
        window.documentUi.renderDocuments({
          list: document.getElementById("documentsList"),
          hint: document.getElementById("documentsHint"),
          docs: documents,
          actions: USER_DOCUMENT_ACTIONS,
        });
      }

      async function handleDocumentAction({ action, id }) {
        if (!Number.isInteger(id)) {
          return;
        }

        if (action === "detail") {
          await viewDetail(id);
          return;
        }

        if (action === "open") {
          await openDoc(id);
          return;
        }

        if (action === "history") {
          await viewHistory(id);
        }
      }

      async function viewDetail(id) {
        try {
          const response = await fetch(`${API_BASE}/api/documents/${id}`, {
            credentials: "include",
          });
          const documentData = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(documentData.message || "No se pudo cargar el detalle.");
          }

          window.documentDialogs.showDocumentDetail(documentData);
        } catch (error) {
          setUserActionMessage(error.message, "error");
        }
      }

      async function openDoc(id) {
        const response = await fetch(`${API_BASE}/api/documents/${id}/open`, {
          method: "POST",
          credentials: "include",
        });
        const data = await response.json().catch(() => ({}));

        if (!response.ok || !data.success) {
          setUserActionMessage(
            data.message || "No se pudo abrir el archivo.",
            "error",
          );
          return;
        }

        setUserActionMessage("Archivo abierto correctamente.", "success", {
          duration: 5000,
        });
      }

      async function viewHistory(id) {
        try {
          const response = await fetch(`${API_BASE}/api/documents/${id}/history`, {
            credentials: "include",
          });
          const history = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(history.message || "No se pudo cargar el historial.");
          }

          window.documentDialogs.showHistory(Array.isArray(history) ? history : []);
        } catch (error) {
          setUserActionMessage(error.message, "error");
        }
      }
    </script>
  </body>
</html>
