<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container page-container-wide">
      <div class="page-header">
        <div class="brand">
          <img src="assets/logo-sag.jpg" alt="Logo SAG" class="brand-logo" />
          <h1 class="brand-title">Panel Admin</h1>
        </div>
      </div>

      <div class="card">
        <p>Bienvenido, <strong id="userName"></strong> (admin)</p>
        <button id="logoutBtn" type="button">Cerrar sesión</button>
      </div>

      <div class="card">
        <h2>Carpetas raíz documentales</h2>
        <form id="rootFolderForm">
          <input type="text" id="folderName" placeholder="Nombre de la carpeta" required />
          <input
            type="file"
            id="rootFolderPicker"
            class="picker-input"
            webkitdirectory
            directory
          />
          <div class="picker-row">
            <button type="button" id="pickRootFolderBtn">Explorar carpeta</button>
            <span id="pickedRootFolderLabel" class="picker-label">Ninguna carpeta seleccionada</span>
          </div>
          <input
            type="text"
            id="folderPath"
            placeholder="Ruta absoluta (ej: D:\doc marzo\ARCHIVO)"
            readonly
            required
          />
          <button type="submit">Agregar carpeta</button>
        </form>
        <ul id="rootFoldersList" class="root-folders-list"></ul>
      </div>

      <div class="card">
        <h2>Indexación</h2>
        <button id="indexBtn" type="button">Ejecutar indexación</button>
        <div id="indexStatus" class="index-status-pill">
          <span id="indexStatusDot" class="index-status-dot"></span>
          <span id="indexStatusText">Indexación inactiva</span>
        </div>
      </div>

      <div class="card">
        <h2>Documentos</h2>
        <div class="filters">
          <input type="text" id="filterName" placeholder="Buscar por nombre" />
          <input type="text" id="filterVoucher" placeholder="Número de comprobante" />
          <select id="filterRootFolder">
            <option value="">Todas las carpetas</option>
          </select>
          <select id="filterStatus">
            <option value="">Todos los estados</option>
            <option value="available">Disponible</option>
            <option value="updated">Actualizado</option>
            <option value="missing">No encontrado</option>
            <option value="pending">Pendiente</option>
            <option value="error">Error</option>
          </select>
          <button id="searchBtn" type="button">Buscar</button>
        </div>
        <p id="documentsHint" class="documents-hint">
          Los documentos aparecerán cuando pulses "Buscar".
        </p>
        <div id="documentsList"></div>
      </div>

      <div class="card">
        <h2>Crear documento nuevo</h2>
        <form id="createDocForm">
          <input type="text" id="docName" placeholder="Nombre visible" required />
          <input type="file" id="docFile" class="picker-input" />
          <div class="picker-row">
            <button type="button" id="pickDocFileBtn">Explorar archivo</button>
            <span id="pickedDocFileLabel" class="picker-label">Ningún archivo seleccionado</span>
          </div>
          <input
            type="text"
            id="docPath"
            placeholder="Ruta del archivo local"
            readonly
            required
          />
          <input type="text" id="docRelativePath" placeholder="Ruta relativa (opcional)" />
          <select id="docRootFolder" required>
            <option value="">Seleccionar carpeta</option>
          </select>
          <input type="date" id="docDate" />
          <input type="text" id="docVoucher" placeholder="Número de comprobante" />
          <input type="text" id="docCategory" placeholder="Categoría" />
          <input type="text" id="docType" placeholder="Tipo documental" />
          <textarea id="docNotes" placeholder="Notas"></textarea>
          <input type="text" id="docSourceArea" placeholder="Área de origen" />
          <button type="submit">Crear documento</button>
        </form>
      </div>

      <div id="editModal" class="modal is-hidden">
        <div class="modal-content">
          <span id="closeEdit" class="modal-close" role="button" tabindex="0">×</span>
          <h2>Editar documento</h2>
          <form id="editDocForm">
            <input type="hidden" id="editDocId" />
            <input type="date" id="editDocDate" />
            <input type="text" id="editDocVoucher" placeholder="Número de comprobante" />
            <input type="text" id="editDocCategory" placeholder="Categoría" />
            <input type="text" id="editDocType" placeholder="Tipo documental" />
            <textarea id="editDocNotes" placeholder="Notas"></textarea>
            <input type="text" id="editDocSourceArea" placeholder="Área de origen" />
            <button type="submit">Actualizar</button>
          </form>
        </div>
      </div>
    </div>

    <script src="/app-config.js"></script>
    <script src="picker-utils.js"></script>
    <script src="document-ui.js"></script>
    <script src="document-dialogs.js"></script>
    <script src="notifications.js"></script>
    <script src="admin/admin-state.js"></script>
    <script src="admin/admin-api.js"></script>
    <script src="admin/admin-root-folders.js"></script>
    <script src="admin/admin-indexing.js"></script>
    <script src="admin/admin-documents.js"></script>
    <script src="admin/admin-page.js"></script>
  </body>
</html>
